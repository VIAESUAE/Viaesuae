layout: default

<article class="section" style="max-width: 800px; margin-top: 120px;">

  <p class="update-date" style="margin-bottom: 40px;">发布于：{{ page.date | date: "%Y-%m-%d" }}</p>

  <div class="post-content fade-in show">
    {{ content }}
  </div>

  </article>
